<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 320px; }
        h2 { text-align: center; margin-bottom: 20px; color: #333; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #45a049; }
        .toggle-link { text-align: center; margin-top: 15px; font-size: 14px; color: #555; cursor: pointer; text-decoration: underline; }
        
        .info-box { background: #f9f9fb; padding: 15px; border-radius: 6px; border-left: 4px solid #4CAF50; margin: 15px 0; font-size: 14px; color: #444; }
        .info-box p { margin: 6px 0; }
        
        .link-btn { display: block; text-align: center; padding: 12px; margin-top: 10px; border-radius: 4px; text-decoration: none; font-weight: bold; color: white; font-size: 14px; }
        .roblox-btn { background-color: #00A2FF; }
        .discord-btn { background-color: #5865F2; }
        .logout-btn { background-color: #f44336; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>
<div class="container">
    <div id="register-box">
        <h2>회원가입</h2>
        <input type="text" id="reg-nickname" placeholder="닉네임" required>
        <input type="password" id="reg-password" placeholder="비밀번호" required>
        <button onclick="handleRegister()">가입하기</button>
        <div class="toggle-link" onclick="toggleForm(false)">이미 계정이 있으신가요? 로그인</div>
    </div>

    <div id="login-box" style="display: none;">
        <h2>로그인</h2>
        <input type="text" id="login-nickname" placeholder="닉네임" required>
        <input type="password" id="login-password" placeholder="비밀번호" required>
        <button onclick="handleLogin()">로그인</button>
        <div class="toggle-link" onclick="toggleForm(true)">계정이 없으신가요? 회원가입</div>
    </div>

    <div id="dashboard-box" style="display: none;">
        <h2>🚀 대시보드</h2>
        <p style="text-align: center; font-size: 18px; margin-bottom: 5px;">
            <strong id="user-greet" style="color: #4CAF50;"></strong>님
        </p>
        
        <div class="info-box">
            <p><strong>🔒 계정 등급:</strong> 일반 회원</p>
            <p><strong>🟢 서버 상태:</strong> 정상 작동 중</p>
        </div>

        <a href="https://www.roblox.com/ko/games/133382610903261/unnamed" target="_blank" class="link-btn roblox-btn">🎮 로블록스 인게임 접속</a>
        <a href="https://discord.gg/rgtuj6GCyD" target="_blank" class="link-btn discord-btn">💬 공식 디스코드 참여</a>
        
        <button class="logout-btn" onclick="handleLogout()">로그아웃</button>
    </div>
</div>

<script>
    function toggleForm(showRegister) {
        document.getElementById('register-box').style.display = showRegister ? 'block' : 'none';
        document.getElementById('login-box').style.display = showRegister ? 'none' : 'block';
        document.getElementById('dashboard-box').style.display = 'none';
    }

    async function handleRegister() {
        const nickname = document.getElementById('reg-nickname').value;
        const password = document.getElementById('reg-password').value;
        const response = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nickname, password })
        });
        const data = await response.json();
        alert(data.message);
        if (response.ok) toggleForm(false);
    }

    async function handleLogin() {
        const nickname = document.getElementById('login-nickname').value;
        const password = document.getElementById('login-password').value;
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nickname, password })
        });
        const data = await response.json();
        
        if (response.ok) {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('dashboard-box').style.display = 'block';
            document.getElementById('user-greet').innerText = data.nickname;
        } else {
            alert(data.message);
        }
    }

    function handleLogout() {
        document.getElementById('dashboard-box').style.display = 'none';
        document.getElementById('login-box').style.display = 'block';
        document.getElementById('login-nickname').value = '';
        document.getElementById('login-password').value = '';
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary-accent: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.4);
            --roblox-color: #00a2ff;
            --roblox-glow: rgba(0, 162, 255, 0.4);
            --discord-color: #5865f2;
            --discord-glow: rgba(88, 101, 242, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', 'Noto Sans KR', sans-serif; }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        body::before, body::after {
            content: ''; position: absolute; width: 300px; height: 300px; border-radius: 50%; filter: blur(80px); opacity: 0.15; z-index: 0;
        }
        body::before { background: #6366f1; top: 15%; left: 20%; }
        body::after { background: #a855f7; bottom: 15%; right: 20%; }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            width: 380px;
            z-index: 1;
            transform: translateY(0);
            transition: all 0.4s ease;
        }

        .form-box {
            animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        h2 {
            color: var(--text-main);
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        h2 i { color: var(--primary-accent); }

        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        .input-group i {
            position: absolute; left: 15px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); font-size: 16px; transition: color 0.3s;
        }

        input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--primary-accent);
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        input:focus + i { color: var(--primary-accent); }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.6);
        }

        .toggle-link {
            text-align: center; margin-top: 20px; font-size: 13px;
            color: var(--text-muted); cursor: pointer; transition: color 0.2s;
        }
        .toggle-link:hover { color: var(--text-main); text-decoration: underline; }

        .welcome-msg {
            font-size: 18px; color: var(--text-main); margin-bottom: 20px; text-align: center; line-height: 1.5;
        }
        .user-name {
            background: linear-gradient(90deg, #a78bfa, #818cf8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 700; font-size: 22px;
        }

        .info-box {
            background: rgba(15, 23, 42, 0.4);
            padding: 18px; border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            margin-bottom: 25px; text-align: left;
        }
        .info-box p {
            margin: 10px 0; font-size: 14px; color: #cbd5e1;
            display: flex; align-items: center; gap: 10px;
        }
        .info-box p:first-child { margin-top: 0; }
        .info-box p:last-child { margin-bottom: 0; }
        .info-box i { font-size: 16px; width: 20px; text-align: center; }
        .status-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; display: inline-block; box-shadow: 0 0 8px #10b981; }

        .link-btn {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 14px; margin-top: 12px; border-radius: 12px;
            text-decoration: none; font-weight: 600; color: white; font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .roblox-btn {
            background: linear-gradient(135deg, #00a2ff 0%, #0077ff 100%);
            box-shadow: 0 4px 15px var(--roblox-glow);
        }
        .roblox-btn:hover {
            transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 162, 255, 0.6);
        }

        .discord-btn {
            background: linear-gradient(135deg, #5865f2 0%, #404eed 100%);
            box-shadow: 0 4px 15px var(--discord-glow);
        }
        .discord-btn:hover {
            transform: translateY(-2px); box-shadow: 0 6px 20px rgba(88, 101, 242, 0.6);
        }

        .logout-btn {
            background: transparent; border: 1px solid rgba(239, 68, 68, 0.4);
            color: #ef4444; margin-top: 25px; box-shadow: none;
        }
        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.1); border-color: #ef4444;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <div id="register-box" class="form-box">
        <h2><i class="fa-solid fa-user-plus"></i> CREATE ACCOUNT</h2>
        <div class="input-group">
            <input type="text" id="reg-nickname" placeholder="사용할 닉네임" required>
            <i class="fa-solid fa-user"></i>
        </div>
        <div class="input-group">
            <input type="password" id="reg-password" placeholder="비밀번호 설정" required>
            <i class="fa-solid fa-lock"></i>
        </div>
        <button class="btn" onclick="handleRegister()">가입하기</button>
        <div class="toggle-link" onclick="toggleForm(false)">이미 계정이 있으신가요? 로그인</div>
    </div>

    <div id="login-box" class="form-box" style="display: none;">
        <h2><i class="fa-solid fa-right-to-bracket"></i> USER LOGIN</h2>
        <div class="input-group">
            <input type="text" id="login-nickname" placeholder="닉네임 입력" required>
            <i class="fa-solid fa-user"></i>
        </div>
        <div class="input-group">
            <input type="password" id="login-password" placeholder="비밀번호 입력" required>
            <i class="fa-solid fa-lock"></i>
        </div>
        <button class="btn" onclick="handleLogin()">로그인</button>
        <div class="toggle-link" onclick="toggleForm(true)">새로운 계정이 필요하신가요? 회원가입</div>
    </div>

    <div id="dashboard-box" class="form-box" style="display: none;">
        <h2><i class="fa-solid fa-chart-line"></i> DASHBOARD</h2>
        <div class="welcome-msg">
            안녕하세요, <span id="user-greet" class="user-name"></span>님!<br>
            성공적으로 인증되었습니다.
        </div>
        
        <div class="info-box">
            <p><i class="fa-solid fa-shield-halved" style="color: #a78bfa;"></i> <span><strong>계정 등급:</strong> 일반 멤버 (User)</span></p>
            <p><i class="fa-solid fa-circle-check" style="color: #10b981;"></i> <span><strong>보안 상태:</strong> 안전함</span></p>
            <p><i class="fa-solid fa-server" style="color: #3b82f6;"></i> <span><strong>서버 연결:</strong> 정상 작동 완료 <span class="status-dot"></span></span></p>
        </div>

        <a href="https://www.roblox.com/ko/games/133382610903261/unnamed" target="_blank" class="link-btn roblox-btn">
            <i class="fa-solid fa-gamepad"></i> 로블록스 인게임 접속
        </a>
        <a href="https://discord.gg/rgtuj6GCyD" target="_blank" class="link-btn discord-btn">
            <i class="fa-brands fa-discord"></i> 공식 디스코드 서버 참여
        </a>
        
        <button class="btn logout-btn" onclick="handleLogout()"><i class="fa-solid fa-power-off"></i> 시스템 로그아웃</button>
    </div>
</div>

<script>
    function toggleForm(showRegister) {
        document.getElementById('register-box').style.display = showRegister ? 'block' : 'none';
        document.getElementById('login-box').style.display = showRegister ? 'none' : 'block';
        document.getElementById('dashboard-box').style.display = 'none';
    }

    async function handleRegister() {
        const nickname = document.getElementById('reg-nickname').value;
        const password = document.getElementById('reg-password').value;
        if(!nickname || !password) return alert("빈칸을 채워주세요!");
        
        const response = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nickname, password })
        });
        const data = await response.json();
        alert(data.message);
        if (response.ok) toggleForm(false);
    }

    async function handleLogin() {
        const nickname = document.getElementById('login-nickname').value;
        const password = document.getElementById('login-password').value;
        if(!nickname || !password) return alert("빈칸을 채워주세요!");

        const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nickname, password })
        });
        const data = await response.json();
        
        if (response.ok) {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('dashboard-box').style.display = 'block';
            document.getElementById('user-greet').innerText = data.nickname;
        } else {
            alert(data.message);
        }
    }

    function handleLogout() {
        document.getElementById('dashboard-box').style.display = 'none';
        document.getElementById('login-box').style.display = 'block';
        document.getElementById('login-nickname').value = '';
        document.getElementById('login-password').value = '';
    }
</script>
</body>
</html>
